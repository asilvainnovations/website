                            content: 'Align decisions with core values, impact potential, and available capacity. Ask: “Does this protect our people? Advance resilience? Fit our resources?” Avoid “analysis paralysis” by setting clear validation thresholds.',

                        {

                {

            users: [
                { id: 1, name: 'Admin User', email: 'admin@rtl.com', password: 'admin123', role: 'admin', enrolled: ['rtl-101', 'st-201'] },
                { id: 2, name: 'Maria Santos', email: 'demo@rtl.com', password: 'demo123', role: 'learner', enrolled: ['rtl-101'] }
            ],
            certificates: []
        };

        // --- STATE MANAGEMENT ---
        const state = {
            currentUser: null,
            currentView: 'login',
            activeCourse: null,
            activeModule: 0
        };

        // --- AUTHENTICATION SYSTEM ---
        const auth = {
            init() {
                const saved = localStorage.getItem('rtl_user');
                if (saved) {
                    state.currentUser = JSON.parse(saved);
                    this.updateUI();
                    router.navigate('dashboard');
                } else {
                    router.navigate('login');
                }
            },
            login(email, password) {
                const user = db.users.find(u => u.email === email && u.password === password);
                if (user) {
                    state.currentUser = user;
                    localStorage.setItem('rtl_user', JSON.stringify(user));
                    this.updateUI();
                    router.navigate('dashboard');
                    return true;
                }
                return false;
            },
            logout() {
                state.currentUser = null;
                localStorage.removeItem('rtl_user');
                router.navigate('login');
            },
            updateUI() {
                if (state.currentUser) {
                    document.getElementById('user-name-display').innerText = state.currentUser.name;
                    document.getElementById('user-role-display').innerText = state.currentUser.role === 'admin' ? 'Administrator' : 'Learner';
                    document.getElementById('user-avatar-initial').innerText = state.currentUser.name.charAt(0);
                    
                    if (state.currentUser.role === 'admin') {
                        document.getElementById('admin-nav-item').classList.remove('hidden');
                    }
                }
            }
        };

        // --- ROUTER ---
        const router = {
            navigate(view, params = {}) {
                state.currentView = view;
                const app = document.getElementById('app-content');
                app.innerHTML = ''; // Clear content

                switch(view) {
                    case 'login':
                        app.innerHTML = views.login();
                        break;
                    case 'dashboard':
                        app.innerHTML = views.dashboard();
                        break;
                    case 'courses':
                        app.innerHTML = views.courses();
                        break;
                    case 'course-player':
                        state.activeCourse = params.courseId;
                        state.activeModule = params.moduleId || 0;
                        app.innerHTML = views.coursePlayer();
                        break;
                    case 'skills':
                        app.innerHTML = views.skills();
                        break;
                    case 'certificates':
                        app.innerHTML = views.certificates();
                        break;
                    case 'admin':
                        app.innerHTML = views.admin();
                        break;
                }
            }
        };

                                        <i class="fa-solid fa-play"></i> Resume Learning
                                    </button>
