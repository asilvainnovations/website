<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>ASilva Innovations | Systems Thinking for Human Flourishing</title>
    <meta name="description" content="Enterprise-grade insights on systems thinking, personal growth, resilience, and mental well-being.">
    
    <!-- Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://asilvainnovations.com">
    <link rel="dns-prefetch" href="https://asilvainnovations.com/assets">
    
    <!-- Fonts with optimized loading -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ============================================
        ROOT VARIABLES & BRAND SYSTEM - ENHANCED
        ============================================ */
        :root {
            /* Primary Brand Colors */
            --brand-primary: #0A2463;
            --brand-secondary: #0D3B66;
            --brand-accent: #00B4D8;
            
            /* Category Colors */
            --category-systems: #2E5EFF;
            --category-growth: #40916C;
            --category-resilience: #FF9F1C;
            --category-wellbeing: #1D5E42;
            --category-mental: #9C6B1B;
            
            /* Light Theme (Default) */
            --color-bg-primary: #F9F5EE;
            --color-bg-secondary: #F3EFE8;
            --color-surface: #FFFFFF;
            --color-surface-alt: #E8F5EE;
            --color-text: #1C1C1E;
            --color-text-muted: #6B6B7B;
            --color-border: #E5E0D8;
            --color-success: #1B4332;
            --color-warning: #D4921E;
            --color-error: #9C6B1B;
            
            /* Dark Theme Overrides */
            [data-theme="dark"] {
                --color-bg-primary: #0C1A12;
                --color-bg-secondary: #142018;
                --color-surface: #1A2E20;
                --color-surface-alt: #142018;
                --color-text: #E8E4DC;
                --color-text-muted: #7FA88A;
                --color-border: #1F3525;
                --color-success: #40916C;
                --color-warning: #F59E0B;
                --color-error: #DC2626;
            }
            
            /* Typography */
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Lora', Georgia, serif;
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-condensed: 'Roboto Condensed', system-ui, sans-serif;
            
            /* Spacing Scale */
            --space-xs: 0.5rem;
            --space-sm: 0.75rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --space-2xl: 3rem;
            --space-3xl: 4rem;
            
            /* Transitions */
            --transition-fast: 150ms ease;
            --transition-normal: 300ms ease;
            --transition-slow: 500ms ease;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 40px rgba(0,0,0,0.15);
            
            /* Logo */
            --logo-url: url('https://asilvainnovations.com/assets/apps/user_1097/app_13212/draft/icon/app_logo.png?1772638774');
        }
        
        /* Reset & Base */
        *, *::before, *::after { box-sizing: border-box; }
        
        html {
            scroll-behavior: smooth;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-ui);
            background: var(--color-bg-primary);
            color: var(--color-text);
            line-height: 1.6;
            transition: background var(--transition-normal), color var(--transition-normal);
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-display);
            font-weight: 700;
            margin-top: 0;
            line-height: 1.2;
        }
        
        .serif { font-family: var(--font-body); }
        .sans { font-family: var(--font-ui); }
        .condensed { font-family: var(--font-condensed); }
        
        img { max-width: 100%; height: auto; display: block; }
        
        button {
            font-family: inherit;
            border: none;
            background: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        input, textarea, select {
            font-family: inherit;
            outline: none;
        }
        
        a { text-decoration: none; color: inherit; transition: var(--transition-fast); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--brand-primary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand-secondary); }
        
        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        
        .skip-link {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 10000;
            background: var(--brand-accent);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 700;
            transform: translateY(-200%);
            transition: transform var(--transition-fast);
        }
        
        .skip-link:focus { transform: translateY(0); }
        
        /* Container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--space-lg);
        }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25%); } }
        
        .fade-in { animation: fadeIn 0.4s ease both; }
        .fade-up { animation: fadeUp 0.55s ease both; }
        .slide-in-right { animation: slideInRight 0.3s ease both; }
        
        /* Hover Effects */
        .hover-lift { transition: transform var(--transition-fast), box-shadow var(--transition-fast); }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }
        
        /* ============================================
        NAVIGATION COMPONENT
        ============================================ */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: transparent;
            padding: var(--space-md) 0;
            transition: background var(--transition-normal), padding var(--transition-normal);
        }
        
        .navbar.scrolled {
            background: rgba(27, 58, 45, 0.98);
            backdrop-filter: blur(16px);
            padding: var(--space-sm) 0;
            border-bottom: 1px solid rgba(255,255,255,.1);
        }
        
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--space-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo-link {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            min-width: 0;
        }
        
        .logo-circle {
            width: 3rem;
            height: 3rem;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
            border-radius: 50%;
            padding: 0.375rem;
            box-shadow: var(--shadow-md);
            border: 3px solid white;
            transition: transform var(--transition-fast);
            flex-shrink: 0;
        }
        
        .logo-link:hover .logo-circle { transform: scale(1.1); }
        
        .logo-circle-inner {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.375rem;
        }
        
        .logo-circle-inner img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .logo-text { display: flex; flex-direction: column; min-width: 0; }
        .logo-title { font-family: var(--font-condensed); font-size: 1.25rem; font-weight: 700; line-height: 1; }
        .logo-tagline { font-size: 0.563rem; color: rgba(255,255,255,.7); letter-spacing: 0.25em; text-transform: uppercase; }
        
        .nav-menu { display: flex; gap: var(--space-md); align-items: center; }
        .nav-link {
            font-size: 0.875rem;
            font-weight: 500;
            color: rgba(255,255,255,.85);
            padding: var(--space-xs) var(--space-sm);
            border-radius: 0.5rem;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        
        .nav-link:hover { background: rgba(255,255,255,.12); }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
            color: white;
            padding: 0.625rem 1.5rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-fast);
        }
        
        .btn-primary:hover { transform: scale(1.05); box-shadow: var(--shadow-lg); }
        
        .mobile-menu-btn {
            display: block;
            color: rgba(255,255,255,.9);
            padding: var(--space-sm);
            border-radius: 0.5rem;
            background: rgba(15, 23, 42, 0.7);
        }
        
        @media (min-width: 768px) { .mobile-menu-btn { display: none; } }
        
        /* ============================================
        HERO SECTION
        ============================================ */
        .hero {
            position: relative;
            min-height: 85vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        
        .hero-bg { position: absolute; inset: 0; z-index: 0; }
        .hero-bg img { width: 100%; height: 100%; object-fit: cover; }
        
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,.9) 0%, rgba(0,0,0,.5) 60%, transparent 100%);
        }
        
        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 1280px;
            margin: 0 auto;
            padding: var(--space-3xl) var(--space-lg);
            text-align: center;
        }
        
        .hero-badge {
            display: inline-block;
            padding: var(--space-xs) var(--space-md);
            border-radius: 9999px;
            background: rgba(0, 180, 216, 0.2);
            border: 1px solid rgba(0, 180, 216, 0.4);
            color: var(--brand-accent);
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: var(--space-lg);
            backdrop-filter: blur(4px);
        }
        
        .hero-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            color: white;
            margin-bottom: var(--space-lg);
            line-height: 1.1;
        }
        
        .hero-excerpt {
            font-size: 1.25rem;
            color: rgba(255,255,255,.9);
            max-width: 680px;
            margin: 0 auto var(--space-lg);
            font-family: var(--font-body);
        }
        
        .hero-actions { display: flex; gap: var(--space-md); justify-content: center; flex-wrap: wrap; }
        
        /* ============================================
        BLOG POST GRID
        ============================================ */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: var(--space-xl);
            padding: var(--space-3xl) 0;
        }
        
        .post-card {
            background: var(--color-surface);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid var(--color-border);
            transition: all var(--transition-normal);
            display: flex;
            flex-direction: column;
        }
        
        .post-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
        }
        
        .post-image-wrapper { position: relative; aspect-ratio: 16/9; overflow: hidden; }
        .post-image { width: 100%; height: 100%; object-fit: cover; transition: transform var(--transition-slow); }
        .post-card:hover .post-image { transform: scale(1.05); }
        
        .post-badge {
            position: absolute;
            top: var(--space-md);
            left: var(--space-md);
            padding: 0.375rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            z-index: 5;
        }
        
        .badge-systems { background: var(--category-systems); color: white; }
        .badge-growth { background: var(--category-growth); color: white; }
        .badge-resilience { background: var(--category-resilience); color: white; }
        .badge-wellbeing { background: var(--category-wellbeing); color: white; }
        .badge-mental { background: var(--category-mental); color: white; }
        
        .post-content { padding: var(--space-lg); flex: 1; display: flex; flex-direction: column; }
        
        .post-title {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: var(--space-sm);
            line-height: 1.3;
        }
        
        .post-meta {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            font-size: 0.813rem;
            color: var(--color-text-muted);
            margin-top: auto;
            padding-top: var(--space-md);
            border-top: 1px solid var(--color-border);
        }
        
        /* ============================================
        ARTICLE VIEWER
        ============================================ */
        .article-viewer {
            position: relative;
            min-height: 100vh;
            background: var(--color-bg-primary);
        }
        
        .reading-progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--brand-primary);
            z-index: 1000;
            transition: width var(--transition-fast);
        }
        
        .article-hero-image {
            position: relative;
            height: 50vh;
            min-height: 400px;
            overflow: hidden;
        }
        
        .article-hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .article-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,.4) 0%, rgba(0,0,0,.8) 100%);
        }
        
        .article-nav-header {
            position: sticky;
            top: 64px;
            z-index: 50;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: var(--space-sm) var(--space-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .article-reader-controls {
            display: flex;
            gap: var(--space-md);
            align-items: center;
            flex-wrap: wrap;
        }
        
        .article-content {
            max-width: 800px;
            margin: var(--space-3xl) auto var(--space-3xl);
            padding: 0 var(--space-lg);
        }
        
        .article-body {
            font-family: var(--font-body);
            font-size: 1.125rem;
            line-height: 1.8;
            color: var(--color-text);
        }
        
        .article-body p { margin-bottom: var(--space-lg); }
        .article-body h2 { font-size: 1.75rem; margin-top: var(--space-2xl); margin-bottom: var(--space-md); }
        .article-body blockquote {
            border-left: 4px solid var(--brand-primary);
            padding-left: var(--space-lg);
            margin: var(--space-xl) 0;
            font-style: italic;
            color: var(--color-text-muted);
        }
        
        .related-posts {
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            padding: var(--space-3xl) var(--space-lg);
        }
        
        /* ============================================
        ADMIN DASHBOARD LAYOUT
        ============================================ */
        .admin-layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: var(--color-bg-primary);
        }
        
        .admin-sidebar {
            width: 260px;
            background: #0F2318;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,.1);
        }
        
        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            border-radius: 0.5rem;
            color: rgba(255,255,255,.7);
            font-size: 0.875rem;
            transition: all var(--transition-fast);
        }
        
        .admin-nav-item:hover { background: rgba(255,255,255,.1); }
        .admin-nav-item.active { background: rgba(45,106,79,.35); color: white; border: 1px solid rgba(45,106,79,.5); }
        
        .admin-main { flex: 1; overflow-y: auto; }
        
        .admin-panel { padding: var(--space-xl); }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-xl);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--color-border);
        }
        
        /* ============================================
        DASHBOARD CARDS & STATS
        ============================================ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-xl);
        }
        
        .stat-card {
            background: var(--color-surface);
            border-radius: 0.75rem;
            padding: var(--space-lg);
            border: 1px solid var(--color-border);
        }
        
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--brand-primary); margin-bottom: 0.25rem; }
        .stat-label { font-size: 0.875rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-trend { font-size: 0.75rem; color: var(--color-success); margin-top: 0.25rem; }
        
        /* ============================================
        TABLES
        ============================================ */
        .table-container {
            background: var(--color-surface);
            border-radius: 0.75rem;
            border: 1px solid var(--color-border);
            overflow: hidden;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }
        
        .data-table th,
        .data-table td {
            padding: var(--space-sm) var(--space-md);
            text-align: left;
            border-bottom: 1px solid var(--color-border);
        }
        
        .data-table th {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
            background: var(--color-bg-secondary);
        }
        
        .data-table tr:hover { background: var(--color-bg-secondary); }
        
        /* ============================================
        FORMS & INPUTS
        ============================================ */
        .form-group { margin-bottom: var(--space-md); }
        
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: var(--space-xs);
        }
        
        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            background: var(--color-surface);
            color: var(--color-text);
            font-size: 0.875rem;
            transition: border-color var(--transition-fast);
        }
        
        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            border-color: var(--brand-accent);
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.1);
        }
        
        .form-textarea { resize: vertical; min-height: 120px; font-family: var(--font-body); }
        
        /* ============================================
        BLOCK EDITOR
        ============================================ */
        .block-editor-container {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            overflow: hidden;
        }
        
        .editor-toolbar {
            padding: var(--space-md);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
            background: var(--color-bg-secondary);
        }
        
        .editor-tool-btn {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: 0.375rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            transition: all var(--transition-fast);
        }
        
        .editor-tool-btn:hover { background: var(--color-bg-primary); }
        .editor-tool-btn.active { background: var(--brand-primary); color: white; border-color: var(--brand-primary); }
        
        .editor-canvas { padding: var(--space-xl); min-height: 400px; }
        
        .editor-block {
            padding: var(--space-md);
            border: 1px solid transparent;
            border-radius: 0.375rem;
            margin-bottom: var(--space-sm);
            position: relative;
            transition: all var(--transition-fast);
        }
        
        .editor-block:hover { border-color: var(--color-border); }
        .editor-block.selected { border-color: var(--brand-primary); box-shadow: var(--shadow-md); }
        
        .block-type-selector {
            position: absolute;
            top: var(--space-xs);
            right: var(--space-xs);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        
        .editor-block:hover .block-type-selector { opacity: 1; }
        
        .block-placeholder {
            color: var(--color-text-muted);
            font-family: var(--font-ui);
            font-size: 0.875rem;
        }
        
        /* ============================================
        NOTIFICATIONS & TOASTS
        ============================================ */
        .toast-container {
            position: fixed;
            bottom: var(--space-lg);
            right: var(--space-lg);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }
        
        .toast {
            background: var(--color-text);
            color: white;
            padding: var(--space-md) var(--space-lg);
            border-radius: 0.5rem;
            display: flex;

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function formatRelativeTime(dateString) {
            const now = new Date();
            const then = new Date(dateString);
            const diffInSeconds = Math.floor((now - then) / 1000);
            
            if (diffInSeconds < 60) return 'Just now';
            if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)} minutes ago`;
            if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)} hours ago`;
            if (diffInSeconds < 604800) return `${Math.floor(diffInSeconds / 86400)} days ago`;
            
            return formatDate(dateString);
        }

                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-triangle',

            };
            
            toast.innerHTML = `
                <i class="fas ${iconMap[type]}"></i>
                <span>${message}</span>

                case 'quote':
                    return `<blockquote style="border-left: 4px solid var(--brand-primary); padding-left: 1.5rem; margin: 2rem 0; font-style: italic; color: var(--color-text-muted); font-size: 1.125rem; line-height: 1.75;">"${block.text}"</blockquote>`;

                    return `<figure style="margin: 2.5rem 0;"><img src="${block.url}" alt="${block.alt || ''}" style="width: 100%; border-radius: 0.5rem; box-shadow: var(--shadow-md);"><figcaption style="text-align: center; font-size: 0.875rem; color: var(--color-text-muted); margin-top: 0.5rem;">${block.caption || ''}</figcaption></figure>`;
                case 'video':
                    return `<div style="position: relative; padding-bottom: 56.25%; height: 0; margin: 2.5rem 0; border-radius: 0.5rem; overflow: hidden;"><iframe src="${block.url}" frameborder="0" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe></div>`;
                default:

            }
        }

        function updateNavigation() {
            const navbar = document.querySelector('.navbar');
            if (navbar) {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            }
        }

        function getCategoryName(categoryId) {
            const names = {
                systems: 'Systems Innovations',
                growth: 'Personal Growth',
                resilience: 'Resilience',
                wellbeing: 'Well-Being',
                mental: 'Mental Health'
            };
            return names[categoryId] || categoryId;
        }

        function filterPosts(posts, filter = 'all') {
            let result = [...posts];
            
            if (filter !== 'all') {
                result = result.filter(p => p.status === filter);
            }
            
            if (appState.currentCategory !== 'all') {
                result = result.filter(p => p.category === appState.currentCategory);
            }
            
            if (appState.searchQuery) {
                const query = appState.searchQuery.toLowerCase();
                result = result.filter(p => 
                    p.title.toLowerCase().includes(query) || 
                    p.excerpt.toLowerCase().includes(query) ||
                    (p.tags && p.tags.some(t => t.toLowerCase().includes(query)))
                );
            }
            
            return result;
        }

        function isAdminAccess() {
            const currentUserEmail = localStorage.getItem('userEmail') || '';
            const adminEmails = ['admin@asilvainnovations.com', 'alvin.silva@asilvainnovations.com'];
            return adminEmails.includes(currentUserEmail);
        }
